{% extends 'school/base.html' %}
{% block title %}تعديل بيانات الطالب{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header bg-warning">
        <h4>✏️ تعديل بيانات الطالب: {{ student.full_name }}</h4>
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-warning">💾 حفظ التعديلات</button>
            <a href="{% url 'student_list' %}" class="btn btn-secondary">رجوع</a>
        </form>
    </div>
</div>
{% endblock %}
