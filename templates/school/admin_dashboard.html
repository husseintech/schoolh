{% extends 'school/base.html' %}
{% block title %}لوحة تحكم المدير{% endblock %}
{% block content %}
<h3 class="mb-4">مرحباً {{ user.username }} - لوحة تحكم المدير</h3>
<div class="row">
    <div class="col-md-6">
        <div class="card stat-card">
            <div class="card-body">
                <div class="number">{{ students_count }}</div>
                <div class="label">إجمالي الطلاب</div>
                <a href="{% url 'student_list' %}" class="btn btn-primary mt-3">عرض الطلاب</a>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card stat-card">
            <div class="card-body">
                <div class="number">{{ notes_count }}</div>
                <div class="label">إجمالي الملاحظات</div>
                <a href="{% url 'note_list' %}" class="btn btn-primary mt-3">عرض الملاحظات</a>
            </div>
        </div>
    </div>
</div>
<div class="row mt-3">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body text-center">
                <a href="{% url 'add_student' %}" class="btn btn-success btn-lg w-100">➕ إضافة طالب جديد</a>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card">
            <div class="card-body text-center">
                <a href="{% url 'add_note' %}" class="btn btn-warning btn-lg w-100">📝 إضافة ملاحظة جديدة</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
