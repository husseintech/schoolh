{% extends 'school/base.html' %}
{% block title %}إضافة ملاحظة للمعلم{% endblock %}
{% block page_heading %}إضافة ملاحظة{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header"><i class="bi bi-sticky-fill"></i> إضافة ملاحظة للمعلم: {{ teacher.full_name }}</div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">{{ form.content.label }}</label>
                        {{ form.content }}
                    </div>
                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> حفظ</button>
                        <a href="{% url 'teacher_notes' teacher.id %}" class="btn btn-outline-secondary">إلغاء</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
