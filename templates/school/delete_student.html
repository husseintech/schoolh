{% extends 'school/base.html' %}
{% block title %}حذف الطالب{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header bg-danger text-white">
        <h4>⚠️ حذف الطالب</h4>
    </div>
    <div class="card-body text-center">
        <p class="lead">هل أنت متأكد من حذف الطالب <strong>{{ student.full_name }}</strong> ({{ student.class_name }})؟</p>
        <p class="text-danger">سيتم حذف جميع بيانات الطالب والملاحظات المرتبطة به.</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">🗑️ نعم، احذف</button>
            <a href="{% url 'student_list' %}" class="btn btn-secondary">إلغاء</a>
        </form>
    </div>
</div>
{% endblock %}
