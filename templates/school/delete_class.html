{% extends 'school/base.html' %}
{% block title %}حذف صف{% endblock %}
{% block page_heading %}حذف صف{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white"><i class="bi bi-exclamation-triangle-fill"></i> تأكيد الحذف</div>
            <div class="card-body text-center py-4">
                <i class="bi bi-building-x text-danger" style="font-size: 4rem;"></i>
                <h5 class="mt-3">هل أنت متأكد من حذف الصف "{{ class_obj.name }}"؟</h5>
                <p class="text-danger small">سيتم فصل الطلاب المرتبطين بهذا الصف</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger"><i class="bi bi-trash-fill"></i> تأكيد الحذف</button>
                    <a href="{% url 'class_list' %}" class="btn btn-outline-secondary">إلغاء</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
