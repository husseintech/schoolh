{% extends 'school/base.html' %}
{% block title %}إضافة صف{% endblock %}
{% block page_heading %}إضافة صف جديد{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header"><i class="bi bi-plus-circle"></i> إضافة صف</div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">{{ form.name.label }}</label>
                        {{ form.name }}
                    </div>
                    <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> حفظ</button>
                    <a href="{% url 'class_list' %}" class="btn btn-outline-secondary">إلغاء</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
